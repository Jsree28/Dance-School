<!DOCTYPE html>
<html>
  <head>
    <title>Login Page</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
        margin: 0;
        background: #faf2f2;
      }

      .topnav {
        background-color: #400303;
        overflow: hidden;
        text-align: right;
      }

      .topnav a {
        display: inline-block;
        color: white;
        padding: 20px;
        text-decoration: none;
      }

      .topnav a:hover {
        background-color: #4d0505;
        color: black;
      }

      .topnav a.active {
        background-color: #121211;
        color: white;
      }

      h1 {
        text-align: center;
        color: black;
      }

      .form-container {
        width: 400px;
        margin: 40px auto;
        background: #fff;
        padding: 30px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        border-radius: 10px;
      }

      .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #400303;
      }

      .form-container input[type="text"],
      .form-container input[type="email"],
      .form-container input[type="password"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      .form-container button {
        width: 100%;
        padding: 10px;
        background-color: #400303;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .form-container button:hover {
        background-color: #4d0505;
      }

      .form-toggle {
        text-align: center;
        margin-bottom: 20px;
      }

      .form-toggle button {
        padding: 10px 20px;
        margin: 0 5px;
        border: none;
        background-color: #ddd;
        cursor: pointer;
        border-radius: 5px;
      }

      .form-toggle button.active {
        background-color: #400303;
        color: white;
      }

      .footer {
        background-color: #420b0b;
        height: 250px;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        color: white;
        padding: 20px;
        box-sizing: border-box;
      }

      .quick-links {
        flex: 1;
        margin-left: 60px;
      }

      .quick-links h4 {
        margin: 0;
        color: gold;
      }

      .quick-links ul {
        list-style: none;
        padding: 0;
      }

      .quick-links li {
        margin: 10px 0;
      }

      .quick-links a {
        color: white;
        text-decoration: none;
      }

      .location {
        flex: 1;
        margin-right: 189px;
      }

      .location a {
        display: block;
        margin: 10px 0;
        color: white;
        text-decoration: none;
      }

      .contact-info {
        flex: 1;
        margin-left: -200px;
        margin-top: 30px;
      }

      .contact-info div {
        margin: 10px 0;
      }

      .ass {
        margin-right: 200px;
        margin-bottom: 55px;
      }

      .icon {
        display: flex;
        flex-direction: row;
        margin-left: auto;
        margin-right: 70px;
      }

      .icon a {
        margin: 5px 5px;
        color: white;
      }

      .icon img {
        margin-right: 5px;
      }
    </style>
    <script>
      function toggleForm(formType) {
        document.getElementById("login-form").style.display =
          formType === "login" ? "block" : "none";
        document.getElementById("signup-form").style.display =
          formType === "signup" ? "block" : "none";
        document
          .getElementById("login-btn")
          .classList.toggle("active", formType === "login");
        document
          .getElementById("signup-btn")
          .classList.toggle("active", formType === "signup");
      }
    </script>
  </head>
  <body>
    <div class="topnav">
      <a href="Dancehome.html">Home</a>
      <a href="Danceblog.html">Blog</a>
      <a href="Dancecontact.html">Contact Us</a>
      <a href="Dancefeedback.html">Feedback</a>
      <a class="active" href="#">Join Us</a>
    </div>

    <h1>Elegance In Dance Academy</h1>

    <div class="form-toggle">
      <button id="login-btn" class="active" onclick="toggleForm('login')">
        Login
      </button>
      <button id="signup-btn" onclick="toggleForm('signup')">Sign Up</button>
    </div>

    <div class="form-container" id="login-form">
      <h2>Login</h2>
      <form>
        <input type="text" placeholder="Username" required />
        <input type="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
    </div>

    <div class="form-container" id="signup-form" style="display: none">
      <h2>Sign Up</h2>
      <form>
        <input type="text" placeholder="Full Name" required />
        <input type="email" placeholder="Email" required />
        <input type="text" placeholder="Username" required />
        <input type="password" placeholder="Password" required />
        <button type="submit">Sign Up</button>
      </form>
    </div>

    <div class="footer">
      <div class="quick-links">
        <h4>Quick Links</h4>
        <ul>
          <li><a href="Dancehome.html">Home</a></li>
          <li><a href="Danceblog.html">Blog</a></li>
          <li><a href="Dancecontactus.html">Contact Us</a></li>
          <li><a href="Dancefeedback.html">Feedback</a></li>
          <li><a href="logindance.html">Join Us</a></li>
        </ul>
      </div>

      <div class="contact-info">
        <div class="location">
          <a
            href="https://www.google.com/maps/search/kalashetra+location/@13.2219218,79.8694469,9z?entry=ttu"
          >
            <img
              src="https://cdn1.iconfinder.com/data/icons/ui-roundicons/480/circle_location-512.png"
              width="20"
              height="20"
            />
            <span>Anna Street, Kalashetra Foundations</span>
          </a>
        </div>
        <div class="call">
          <img
            src="https://static.vecteezy.com/system/resources/previews/015/720/174/original/eps10-white-phone-call-or-telephone-abstract-icon-isolated-on-black-background-contact-us-or-hotline-symbol-in-a-simple-flat-trendy-modern-style-for-your-website-design-logo-and-mobile-app-vector.jpg"
            width="20"
            height="20"
          />
          +15555 55555
        </div>
        <div class="mail">
          <img
            src="https://i.pinimg.com/736x/b8/a3/2d/b8a32d5bfb694e012dde03d2e6b90c9f.jpg"
            width="20"
            height="20"
          />
          elegance@gmail.com
        </div>
        <div class="copy" style="margin-top: 55px; font-size: 15px">
          <center><p>©copyrights@2024</p></center>
        </div>
      </div>

      <div class="sec">
        <div class="ass">
          <p>
            <a href="Accessibility.html" style="color: white">Accessibility</a>
          </p>
          <p><a href="privacy.html" style="color: white">Privacy Policy</a></p>
          <p>
            <a href="Terms.html" style="color: white">Terms & Conditions</a>
          </p>
        </div>
      </div>

      <div class="icon">
        <a href="https://www.facebook.com/">
          <img
            src="https://i.pinimg.com/736x/a9/65/60/a96560736d99ada6f624c8532ac249b6.jpg"
            width="20"
            height="20"
          />
        </a>
        <a href="https://www.instagram.com">
          <img
            src="https://e1.pxfuel.com/desktop-wallpaper/328/718/desktop-wallpaper-instagram-logo-instagram-black-and-white-thumbnail.jpg"
            width="20"
            height="20"
          />
        </a>
        <a href="https://www.twitter.com">
          <img
            src="https://i.pinimg.com/originals/5b/73/45/5b73459960abeab3bd7be40fdc2fd6c3.jpg"
            width="20"
            height="20"
          />
        </a>
        <a href="https://github.com/errormakesclever/html-youtube-tutorial">
          <img
            src="https://i.pinimg.com/736x/b5/1b/78/b51b78ecc9e5711274931774e433b5e6.jpg"
            width="20"
            height="20"
          />
        </a>
      </div>
    </div>
  </body>
</html>
